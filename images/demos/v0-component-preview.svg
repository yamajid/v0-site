<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="previewbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#previewbg)"/>
  
  <!-- Browser chrome -->
  <rect x="40" y="30" width="720" height="440" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="30" width="720" height="45" rx="12" fill="#f1f5f9"/>
  <circle cx="65" cy="52" r="6" fill="#f87171"/>
  <circle cx="85" cy="52" r="6" fill="#fbbf24"/>
  <circle cx="105" cy="52" r="6" fill="#4ade80"/>
  <rect x="140" y="42" width="500" height="22" rx="11" fill="white"/>
  <text x="160" y="58" font-family="system-ui" font-size="12" fill="#94a3b8">localhost:3000/dashboard</text>
  
  <!-- Dashboard content -->
  <rect x="60" y="95" width="680" height="355" fill="white"/>
  
  <!-- Stats cards -->
  <rect x="80" y="115" width="200" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="145" font-family="system-ui" font-size="13" fill="#64748b">Total Revenue</text>
  <text x="100" y="180" font-family="system-ui" font-size="28" font-weight="700" fill="#0f172a">$45,231.89</text>
  <text x="100" y="200" font-family="system-ui" font-size="12" fill="#22c55e">+20.1% from last month</text>
  
  <rect x="300" y="115" width="200" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="145" font-family="system-ui" font-size="13" fill="#64748b">Subscriptions</text>
  <text x="320" y="180" font-family="system-ui" font-size="28" font-weight="700" fill="#0f172a">+2,350</text>
  <text x="320" y="200" font-family="system-ui" font-size="12" fill="#22c55e">+180.1% from last month</text>
  
  <rect x="520" y="115" width="200" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="145" font-family="system-ui" font-size="13" fill="#64748b">Active Now</text>
  <text x="540" y="180" font-family="system-ui" font-size="28" font-weight="700" fill="#0f172a">+573</text>
  <text x="540" y="200" font-family="system-ui" font-size="12" fill="#22c55e">+201 since last hour</text>
  
  <!-- Chart area -->
  <rect x="80" y="235" width="420" height="200" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="265" font-family="system-ui" font-size="14" font-weight="600" fill="#0f172a">Overview</text>
  
  <!-- Bar chart -->
  <rect x="110" y="380" width="30" height="40" fill="#10b981" rx="2"/>
  <rect x="155" y="350" width="30" height="70" fill="#10b981" rx="2"/>
  <rect x="200" y="320" width="30" height="100" fill="#10b981" rx="2"/>
  <rect x="245" y="340" width="30" height="80" fill="#10b981" rx="2"/>
  <rect x="290" y="300" width="30" height="120" fill="#10b981" rx="2"/>
  <rect x="335" y="330" width="30" height="90" fill="#10b981" rx="2"/>
  <rect x="380" y="290" width="30" height="130" fill="#10b981" rx="2"/>
  <rect x="425" y="310" width="30" height="110" fill="#10b981" rx="2"/>
  
  <!-- Recent activity -->
  <rect x="520" y="235" width="200" height="200" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="265" font-family="system-ui" font-size="14" font-weight="600" fill="#0f172a">Recent Sales</text>
  
  <circle cx="555" cy="300" r="16" fill="#e0f2fe"/>
  <text x="555" y="305" font-family="system-ui" font-size="12" fill="#0369a1" text-anchor="middle">OM</text>
  <text x="585" y="295" font-family="system-ui" font-size="13" fill="#0f172a">Olivia Martin</text>
  <text x="585" y="312" font-family="system-ui" font-size="11" fill="#64748b">olivia@email.com</text>
  <text x="690" y="305" font-family="system-ui" font-size="13" font-weight="600" fill="#0f172a">+$1,999</text>
  
  <circle cx="555" cy="355" r="16" fill="#fce7f3"/>
  <text x="555" y="360" font-family="system-ui" font-size="12" fill="#be185d" text-anchor="middle">JL</text>
  <text x="585" y="350" font-family="system-ui" font-size="13" fill="#0f172a">Jackson Lee</text>
  <text x="585" y="367" font-family="system-ui" font-size="11" fill="#64748b">jackson@email.com</text>
  <text x="690" y="360" font-family="system-ui" font-size="13" font-weight="600" fill="#0f172a">+$39</text>
</svg>
