<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="250" height="800" fill="#111827"/>
  <rect x="20" y="20" width="210" height="40" rx="8" fill="#1f2937"/>
  <text x="40" y="47" font-family="system-ui" font-size="16" fill="#9ca3af">Search projects...</text>
  
  <!-- Chat history items -->
  <rect x="20" y="80" width="210" height="50" rx="6" fill="#1f2937"/>
  <text x="35" y="110" font-family="system-ui" font-size="14" fill="white">Dashboard UI</text>
  <rect x="20" y="140" width="210" height="50" rx="6" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="35" y="170" font-family="system-ui" font-size="14" fill="#9ca3af">Landing Page</text>
  <rect x="20" y="200" width="210" height="50" rx="6" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="35" y="230" font-family="system-ui" font-size="14" fill="#9ca3af">Auth Flow</text>
  
  <!-- Main content area -->
  <rect x="250" y="0" width="650" height="800" fill="#0f172a"/>
  
  <!-- Chat messages -->
  <rect x="280" y="30" width="590" height="80" rx="12" fill="#1e293b"/>
  <text x="300" y="60" font-family="system-ui" font-size="14" fill="#10b981">You</text>
  <text x="300" y="85" font-family="system-ui" font-size="14" fill="#e2e8f0">Create a modern dashboard with charts and stats</text>
  
  <rect x="280" y="130" width="590" height="120" rx="12" fill="#1e3a5f"/>
  <text x="300" y="160" font-family="system-ui" font-size="14" fill="#06b6d4">v0</text>
  <text x="300" y="185" font-family="system-ui" font-size="14" fill="#e2e8f0">I'll create a dashboard with:</text>
  <text x="300" y="210" font-family="system-ui" font-size="13" fill="#94a3b8">• Revenue chart with area graph</text>
  <text x="300" y="230" font-family="system-ui" font-size="13" fill="#94a3b8">• Key metrics cards</text>
  
  <!-- Code output area -->
  <rect x="280" y="270" width="590" height="300" rx="12" fill="#1e293b"/>
  <rect x="280" y="270" width="590" height="35" rx="12" fill="#334155"/>
  <circle cx="300" cy="287" r="6" fill="#ef4444"/>
  <circle cx="320" cy="287" r="6" fill="#eab308"/>
  <circle cx="340" cy="287" r="6" fill="#22c55e"/>
  <text x="380" y="292" font-family="monospace" font-size="12" fill="#94a3b8">dashboard.tsx</text>
  
  <text x="300" y="330" font-family="monospace" font-size="12" fill="#c084fc">export default</text>
  <text x="420" y="330" font-family="monospace" font-size="12" fill="#60a5fa">function</text>
  <text x="495" y="330" font-family="monospace" font-size="12" fill="#fbbf24">Dashboard</text>
  <text x="580" y="330" font-family="monospace" font-size="12" fill="white">() {</text>
  <text x="320" y="355" font-family="monospace" font-size="12" fill="#c084fc">return</text>
  <text x="370" y="355" font-family="monospace" font-size="12" fill="white">(</text>
  <text x="340" y="380" font-family="monospace" font-size="12" fill="#60a5fa">&lt;div</text>
  <text x="380" y="380" font-family="monospace" font-size="12" fill="#fbbf24">className</text>
  <text x="455" y="380" font-family="monospace" font-size="12" fill="white">=</text>
  <text x="465" y="380" font-family="monospace" font-size="12" fill="#22c55e">"p-6"</text>
  <text x="510" y="380" font-family="monospace" font-size="12" fill="#60a5fa">&gt;</text>
  
  <!-- Input area -->
  <rect x="280" y="590" width="590" height="60" rx="30" fill="#1e293b" stroke="#374151" stroke-width="1"/>
  <text x="320" y="625" font-family="system-ui" font-size="14" fill="#6b7280">Ask v0 a follow-up...</text>
  <rect x="810" y="600" width="40" height="40" rx="20" fill="#10b981"/>
  
  <!-- Preview panel -->
  <rect x="900" y="0" width="300" height="800" fill="#ffffff"/>
  <rect x="900" y="0" width="300" height="50" fill="#f1f5f9"/>
  <text x="920" y="32" font-family="system-ui" font-size="14" fill="#1e293b" font-weight="600">Preview</text>
  
  <!-- Dashboard preview -->
  <rect x="920" y="70" width="260" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="940" y="95" font-family="system-ui" font-size="12" fill="#64748b">Total Revenue</text>
  <text x="940" y="125" font-family="system-ui" font-size="24" fill="#0f172a" font-weight="700">$45,231</text>
  <text x="1100" y="125" font-family="system-ui" font-size="12" fill="#22c55e">+20.1%</text>
  
  <rect x="920" y="160" width="260" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="940" y="185" font-family="system-ui" font-size="12" fill="#64748b">Active Users</text>
  <text x="940" y="215" font-family="system-ui" font-size="24" fill="#0f172a" font-weight="700">2,350</text>
  <text x="1100" y="215" font-family="system-ui" font-size="12" fill="#22c55e">+180</text>
  
  <!-- Chart mockup -->
  <rect x="920" y="260" width="260" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="940" y="285" font-family="system-ui" font-size="12" fill="#64748b">Revenue Over Time</text>
  <polyline points="940,380 980,350 1020,360 1060,320 1100,330 1140,290" fill="none" stroke="#10b981" stroke-width="2"/>
  <polygon points="940,380 980,350 1020,360 1060,320 1100,330 1140,290 1140,380 940,380" fill="#10b981" opacity="0.2"/>
</svg>
